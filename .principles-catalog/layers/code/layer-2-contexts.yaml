# Code Stack — Layer 2: Context-activated principles
# Activated when code context matches the listed signals.
# Layer 1 principles are always active; these are additive.
# Note: infrastructure context has moved to layers/infra/ stack.

api-design:
  description: "REST/HTTP API endpoints, controllers, and route handlers"
  signals:
    - "@RestController"
    - "@GetMapping"
    - "@PostMapping"
    - "@RequestMapping"
    - "app.get("
    - "app.post("
    - "router."
    - "HttpResponse"
    - "status_code"
    - "REST"
    - "endpoint"
    - "controller"
    - "FastAPI"
    - "flask"
    - "express"
    - "OpenAPI"
    - "swagger"
  activate:
    - CODE-API-STANDARD-HTTP-METHODS
    - CODE-API-HATEOAS
    - CODE-API-RESOURCE-NOUNS
    - CODE-API-BACKWARD-COMPATIBILITY
    - CODE-API-HTTP-STATUS-CODES
    - CODE-SEC-VALIDATE-INPUT
    - OWASP-03-INJECTION

