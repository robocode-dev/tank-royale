# The corpus wall: the same released clue that runs locally judges every PR
# and push to main. Job name `validate` is the intended required status check
# under branch protection. The clue repo (cliewen/cliewen) is public
# (P-001/M-003), so the release binary is downloaded directly and verified
# against that release's own SHA256SUMS before every run.
name: Clue

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    env:
      CLUE_VERSION: 0.5.1
    steps:
      - uses: actions/checkout@v4

      - name: Download and verify clue ${{ env.CLUE_VERSION }}
        run: |
          set -euo pipefail
          base="https://github.com/cliewen/cliewen/releases/download/v${CLUE_VERSION}"
          curl -sLO "${base}/clue-${CLUE_VERSION}-linux-amd64"
          curl -sLO "${base}/SHA256SUMS"
          sha256sum -c --ignore-missing SHA256SUMS
          install -m 0755 "clue-${CLUE_VERSION}-linux-amd64" /usr/local/bin/clue
          clue version

      - name: clue validate
        run: clue validate --forbid-changes
