$id: start-game.schema.yaml
$schema: https://json-schema.org/draft/2020-12/schema
description: Command to start a new game
extends:
  $ref: message.schema.yaml
properties:
  gameSetup:
    description: Game setup
    $ref: game-setup.schema.yaml
  botAddresses:
    description: List of bot addresses
    type: array
    items:
      description: Bot address
      $ref: bot-address.schema.yaml
  debugMode:
    description: >
      If true, the server starts the game in debug mode (ADR-0033).
      The server pauses after each turn instead of auto-advancing.
      Equivalent to sending enable-debug-mode immediately after start-game,
      but without a race condition.
    type: boolean
required:
  - botAddresses