$id: text.schema.yaml
$schema: https://json-schema.org/draft/2020-12/schema
description: A text centered at at point (x, y) relative to the bot´s center
extends:
  $ref: graphical-object.schema.yaml
properties:
  x:
    description: X coordinate that is the center of the text relative to the bot´s center
    type: number
  y:
    description: Y coordinate that is the center of the text relative to the bot´s center
    type: number
  height:
    description: Height of the text
    type: number
  color:
    description: Color of the text
    $ref: color.schema.yaml
required:
  - x
  - y
  - height
  - color