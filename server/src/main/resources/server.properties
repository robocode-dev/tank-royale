# Server Configuration
# ====================
# This file provides default values for the server.
# Values can be overridden via CLI arguments.
#
# Uncomment and modify values as needed.

# Server port (default: 7654)
# port=7654

# Comma-separated list of game types: classic, 1v1, melee (default: classic)
# games=classic

# Comma-separated controller secrets (empty = no auth required)
# controllerSecrets=

# Comma-separated bot secrets (empty = no auth required)
# botSecrets=

# Enable initial position for bots (default: false)
# initialPositionEnabled=false

# Turns per second (default: 30, use -1 for max, 0 for paused)
# tps=30

# Enable debug mode support (default: true)
# Set to false for tournaments
# debugModeSupported=true

# Enable breakpoint mode support (default: true)
# Set to false for tournaments
# breakpointModeSupported=true
