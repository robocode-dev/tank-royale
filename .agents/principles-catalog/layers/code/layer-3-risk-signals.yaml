    - "migration"
    - "brownfield"
    - "legacy"
    - "technical_debt"
    - "tech_debt"
    - "deprecated"
    - "backward_compat"
    - "strangler"
    - "anti-corruption"
    - "modernize"
    - "rewrite"
    - "upgrade"
