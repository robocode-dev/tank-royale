    - "RPC"
    - "gRPC"
    - "event-driven"
    - "event_bus"
    - "saga"
    - "choreography"
    - "orchestration"
    - "circuit_breaker"
    - "retry"
    - "timeout"
    - "idempotent"
    - "eventual_consistency"
    - "distributed"
    - "service_mesh"
    - "message_broker"
    - "outbox"
    - "dead_letter"
  elevate:
    - CODE-RL-FAULT-TOLERANCE
    - CODE-RL-IDEMPOTENCY
    - CODE-CS-CIRCUIT-BREAKER
    - CODE-RL-BACKPRESSURE
    - CODE-RL-CONSISTENCY-MODELS
    - CODE-OB-STRUCTURED-TELEMETRY
    - CODE-OB-HIGH-CARDINALITY
    - CODE-OB-DISTRIBUTED-TRACING
    - CODE-AR-ASYNC-MESSAGING
    - CODE-AR-PIPES-AND-FILTERS
