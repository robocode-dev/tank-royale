    - CODE-SMELLS-LONG-METHOD
    - CODE-SMELLS-LARGE-CLASS
    - CODE-SMELLS-FEATURE-ENVY
    - CODE-SMELLS-DATA-CLUMPS
    - CODE-SMELLS-PRIMITIVE-OBSESSION
    - CODE-SMELLS-SWITCH-STATEMENTS
    - CODE-SMELLS-SPECULATIVE-GENERALITY
    - CODE-SMELLS-MESSAGE-CHAINS
    - CODE-SMELLS-COMMENTS-AS-DEODORANT
    - SIMPLE-DESIGN-PASSES-TESTS
    - SIMPLE-DESIGN-REVEALS-INTENTION
    - SIMPLE-DESIGN-NO-DUPLICATION
    - SIMPLE-DESIGN-FEWEST-ELEMENTS
