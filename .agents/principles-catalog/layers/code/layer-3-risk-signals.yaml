# Code Stack — Layer 3: Risk-elevated principles
# When risk signals are detected, these principles are elevated to higher priority.
# Elevation means the reviewer should weight these principles more heavily
# and flag violations with greater urgency.

authentication:
  description: "Code handling user authentication, sessions, or identity verification"
  signals:
    - "password"
    - "login"
    - "logout"
    - "OAuth"
    - "JWT"
    - "token"
    - "session"
    - "authenticate"
    - "credential"
    - "sign_in"
    - "sign_up"
    - "bcrypt"
    - "hash"
    - "salt"
    - "OIDC"
    - "SAML"
    - "bearer"
    - "refresh_token"
  elevate:
    - OWASP-01-BROKEN-ACCESS-CONTROL
    - CODE-SEC-STRONG-CRYPTOGRAPHY
    - OWASP-07-AUTHENTICATION-FAILURES

financial:
  description: "Code processing payments, billing, currency, or financial transactions"
  signals:
    - "payment"
    - "billing"
    - "invoice"
    - "currency"
    - "transaction"
    - "charge"
    - "refund"
    - "stripe"
    - "paypal"
    - "ledger"
    - "account_balance"
    - "decimal"
    - "money"
    - "price"
    - "checkout"
    - "subscription"
  elevate:
    - CODE-SEC-VALIDATE-INPUT
    - OWASP-03-INJECTION
    - CODE-RL-IDEMPOTENCY
    - CODE-CC-SYNC-SHARED-STATE

personal-data:
  description: "Code handling personally identifiable information or privacy-sensitive data"
  signals:
    - "PII"
    - "GDPR"
    - "email"
    - "SSN"
    - "social_security"
    - "address"
    - "phone_number"
    - "date_of_birth"
    - "passport"
    - "driver_license"
    - "personal_data"
    - "consent"
    - "data_subject"
    - "anonymize"
    - "pseudonymize"
    - "encryption"
    - "CCPA"
    - "HIPAA"
  elevate:
    - CODE-SEC-VALIDATE-INPUT
    - CODE-SEC-STRONG-CRYPTOGRAPHY
    - CODE-SEC-SECURITY-BY-DESIGN
    - CODE-SEC-SECURITY-LOGGING

public-api:
  description: "Versioned or published APIs consumed by third-party clients"
  signals:
    - "versioned"
    - "v1"
    - "v2"
    - "published"
    - "third-party"
    - "external"
    - "consumer"
    - "backward_compatible"
    - "deprecat"
    - "changelog"
    - "breaking_change"
    - "semver"
    - "api_version"
    - "public_api"
  elevate:
    - CODE-API-BACKWARD-COMPATIBILITY
    - EFFECTIVE-JAVA-MINIMIZE-ACCESSIBILITY
    - EFFECTIVE-JAVA-DESIGN-METHOD-SIGNATURES
    - CODE-RL-SCHEMA-EVOLUTION

high-throughput:
  description: "Performance-critical code paths requiring low latency or high throughput"
  signals:
    - "hot_path"
    - "hot path"
    - "real-time"
    - "realtime"
    - "low-latency"
    - "low_latency"
    - "performance"
    - "benchmark"
    - "throughput"
    - "cache"
    - "pool"
    - "buffer"
    - "batch_size"
    - "optimization"
    - "critical_path"
    - "microsecond"
    - "nanosecond"
  elevate:
    - CODE-PF-PROFILE-FIRST
    - CODE-PF-MECHANICAL-SYMPATHY
    - CODE-PF-DATA-LOCALITY
    - CODE-PF-MINIMIZE-ALLOCATION
    - CODE-PF-PREDICTABLE-LATENCY
    - CODE-CC-AVOID-LOCKS-IN-HOT-PATHS

distributed-system:
  description: "Distributed architectures with inter-service communication and eventual consistency"
  signals:
