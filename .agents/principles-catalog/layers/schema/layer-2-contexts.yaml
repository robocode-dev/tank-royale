# Schema Stack — Layer 2: Context-activated principles
# Activated when schema file content matches the listed signals.
# Layer 1 principles are always active; these are additive.

openapi:
  description: "OpenAPI / Swagger REST API definitions"
  signals:
    - "openapi"
    - "swagger"
    - "paths:"
    - "components:"
    - "schemas:"
    - "operationId"
    - "requestBody"
    - "responses:"
  activate:
    - CODE-API-RESOURCE-NOUNS
    - CODE-API-HTTP-STATUS-CODES
    - CODE-API-HATEOAS
    - SCHEMA-FIELD-OPTIONALITY
    - SCHEMA-NO-POLYMORPHIC-BLOBS
    - SCHEMA-ENUM-EVOLUTION

protobuf:
  description: "Protocol Buffer service and message definitions"
  signals:
    - "syntax = \"proto"
    - "message "
    - "rpc "
    - "service "
    - "google.protobuf"
    - "import \"google"
    - "oneof "
  activate:
    - CODE-API-BACKWARD-COMPATIBILITY
    - EIP-CORRELATION-IDENTIFIER
    - SCHEMA-FIELD-OPTIONALITY
    - SCHEMA-NO-POLYMORPHIC-BLOBS
    - SCHEMA-ENUM-EVOLUTION

graphql:
  description: "GraphQL schema definitions"
  signals:
    - "type Query"
    - "type Mutation"
    - "type Subscription"
    - "schema {"
    - "input "
    - "enum "
    - "fragment"
    - "interface "
    - "union "
  activate:
    - CODE-API-BACKWARD-COMPATIBILITY
    - CODE-API-RESOURCE-NOUNS
    - SCHEMA-FIELD-OPTIONALITY
    - SCHEMA-NO-POLYMORPHIC-BLOBS
    - SCHEMA-ENUM-EVOLUTION

avro:
  description: "Apache Avro schema definitions"
  signals:
    - "\"type\": \"record\""
    - "\"type\": \"enum\""
    - "\"fields\":"
    - "\"namespace\":"
    - "avro"
    - ".avsc"
  activate:
    - CODE-API-BACKWARD-COMPATIBILITY
    - SCHEMA-FIELD-OPTIONALITY
    - SCHEMA-ENUM-EVOLUTION

sql-schema:
  description: "SQL DDL — table definitions, migrations, and schema changes"
  signals:
    - "CREATE TABLE"
    - "ALTER TABLE"
    - "ADD COLUMN"
    - "DROP"
    - "FOREIGN KEY"
    - "INDEX"
    - "CONSTRAINT"
    - "CREATE INDEX"
    - "RENAME"
  activate:
    - CODE-API-BACKWARD-COMPATIBILITY
    - DB-SCHEMA-MIGRATIONS-AS-CODE
    - SCHEMA-NO-POLYMORPHIC-BLOBS
