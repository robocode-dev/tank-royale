name: schema
description: "Schema and contract design principles (WCAG-level: backward compatibility, optionality, enum safety, self-describing types). Activate for repos with OpenAPI, Protobuf, GraphQL, Avro, or SQL schema files."

globs:
  - "**/*.proto"
  - "**/*.graphql"
  - "**/*.gql"
  - "**/*.avsc"
  - "**/openapi.yaml"
  - "**/openapi.json"
  - "**/swagger.yaml"
  - "**/swagger.json"
  - "**/*.sql"

principles:
  - SCHEMA-SELF-DESCRIBING
  - SCHEMA-FIELD-OPTIONALITY
  - SCHEMA-NO-POLYMORPHIC-BLOBS
  - SCHEMA-ENUM-EVOLUTION
  - CODE-API-BACKWARD-COMPATIBILITY
